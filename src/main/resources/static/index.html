<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanWatch – Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }

        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            color: #1a3c5e;
            border-bottom-color: #1a3c5e;
        }

        .tab-panel {
            display: none;
        }

        .tab-panel.active {
            display: block;
        }

        .success-msg {
            color: #27ae60;
            font-size: 0.82rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }

        .role-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            background: white;
            color: #333;
        }

        .role-select:focus {
            border-color: #1a3c5e;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 18px 0;
        }

        .divider hr {
            flex: 1;
            border: none;
            border-top: 1px solid #eee;
        }

        .divider span {
            font-size: 0.78rem;
            color: #bbb;
        }

        .btn-guest {
            width: 100%;
            padding: 11px;
            background: white;
            color: #1a3c5e;
            border: 2px solid #1a3c5e;
            border-radius: 6px;
            font-size: 0.9rem;
            cursor: pointer;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-guest:hover {
            background: #f0f4f8;
        }

        .guest-note {
            font-size: 0.75rem;
            color: #aaa;
            text-align: center;
            margin-top: 8px;
        }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h2>LoanWatch</h2>
        <p>Loan risk monitoring system</p>

        <button class="btn-guest" style="margin-top: 20px;" onclick="guestLogin()">
            👤 Guest / Demo Login
        </button>
        <p class="guest-note">One click access · Full feature demo · No registration needed</p>

        <div class="divider">
            <hr><span>or sign in with your account</span><hr>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login -->
        <div class="tab-panel active" id="loginPanel">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="login()">Sign In</button>
            <p class="error-msg" id="loginErr"></p>
        </div>

        <!-- Register -->
        <div class="tab-panel" id="registerPanel">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Raj Vaibhav">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select class="role-select" id="regRole">
                    <option value="MANAGER">Manager</option>
                    <option value="ADMIN">Admin</option>
                    <option value="FIELD_AGENT">Field Agent</option>
                </select>
            </div>
            <button class="btn-primary" onclick="register()">Create Account</button>
            <p class="error-msg" id="registerErr"></p>
            <p class="success-msg" id="registerSuccess">Account created! You can now sign in.</p>
        </div>
    </div>
</div>

<script>
    // only redirect if token exists AND user deliberately navigated here
    // recruiters on a fresh machine won't have a token so they see this page
    const existingToken = localStorage.getItem('token');
    if (existingToken && !window.location.search.includes('logout')) {
        window.location.href = 'dashboard.html';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));

        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginPanel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('registerPanel').classList.add('active');
        }
    }

    async function doLogin(email, password) {
        const res = await fetch(`/api/auth/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
            method: 'POST'
        });
        const token = await res.text();
        if (!res.ok || token.toLowerCase().includes('not found') || token.toLowerCase().includes('wrong')) {
            return { error: token };
        }
        return { token };
    }

    async function guestLogin() {
        const btn = document.querySelector('.btn-guest');
        btn.textContent = 'Logging in...';
        btn.disabled = true;

        const result = await doLogin('demo@loanwatch.com', 'demo123');

        if (result.error) {
            btn.textContent = '👤 Guest / Demo Login';
            btn.disabled = false;
            alert('Demo account not ready yet. Please restart the server.');
            return;
        }

        localStorage.setItem('token', result.token);
        window.location.href = 'dashboard.html';
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errEl = document.getElementById('loginErr');

        errEl.style.display = 'none';

        if (!email || !password) {
            errEl.textContent = 'Please fill in all fields';
            errEl.style.display = 'block';
            return;
        }

        const result = await doLogin(email, password);

        if (result.error) {
            errEl.textContent = result.error;
            errEl.style.display = 'block';
            return;
        }

        localStorage.setItem('token', result.token);
        window.location.href = 'dashboard.html';
    }

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const role = document.getElementById('regRole').value;
        const errEl = document.getElementById('registerErr');
        const successEl = document.getElementById('registerSuccess');

        errEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!name || !email || !password) {
            errEl.textContent = 'Please fill in all fields';
            errEl.style.display = 'block';
            return;
        }

        const res = await fetch(`/api/auth/register?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${role}`, {
            method: 'POST'
        });

        const msg = await res.text();

        if (msg.toLowerCase().includes('already')) {
            errEl.textContent = msg;
            errEl.style.display = 'block';
            return;
        }

        successEl.style.display = 'block';
        setTimeout(() => switchTab('login'), 1500);
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const activePanel = document.querySelector('.tab-panel.active').id;
            if (activePanel === 'loginPanel') login();
            else register();
        }
    });
</script>

</body>
</html>
