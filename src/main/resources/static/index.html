<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanWatch – Login</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h2>LoanWatch</h2>
        <p>Sign in to your account</p>

        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="you@example.com">
        </div>

        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>

        <button class="btn-primary" onclick="login()">Sign In</button>
        <p class="error-msg" id="errMsg">Invalid email or password</p>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    async function login() {
        const email = document.getElementById('email').value.trim();
        const password = document.getElementById('password').value.trim();
        const errMsg = document.getElementById('errMsg');

        if (!email || !password) {
            errMsg.textContent = 'Please fill in all fields';
            errMsg.style.display = 'block';
            return;
        }

        try {
            const res = await fetch(`/api/auth/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
                method: 'POST'
            });

            const token = await res.text();

            if (!res.ok || token.toLowerCase().includes('not found') || token.toLowerCase().includes('wrong')) {
                errMsg.textContent = token;
                errMsg.style.display = 'block';
                return;
            }

            localStorage.setItem('token', token);
            window.location.href = 'dashboard.html';

        } catch (e) {
            errMsg.textContent = 'Could not connect to server';
            errMsg.style.display = 'block';
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') login();
    });
</script>

</body>
</html>
