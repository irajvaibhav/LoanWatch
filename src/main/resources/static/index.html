<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanWatch – Login</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .tabs {
            display: flex;
            margin-bottom: 24px;
            border-bottom: 2px solid #f0f0f0;
        }
        .tab {
            flex: 1;
            text-align: center;
            padding: 10px;
            cursor: pointer;
            font-size: 0.9rem;
            font-weight: 500;
            color: #999;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }
        .tab.active {
            color: #1a3c5e;
            border-bottom-color: #1a3c5e;
        }
        .tab-panel { display: none; }
        .tab-panel.active { display: block; }
        .success-msg {
            color: #27ae60;
            font-size: 0.82rem;
            margin-top: 12px;
            text-align: center;
            display: none;
        }
        .role-select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            background: white;
            color: #333;
        }
        .role-select:focus { border-color: #1a3c5e; }
        .demo-box {
            background: #f0f5fa;
            border: 1px solid #cce0f5;
            border-radius: 8px;
            padding: 12px 16px;
            margin-bottom: 20px;
            text-align: center;
        }
        .demo-box p {
            margin: 0 0 4px 0;
            font-size: 0.82rem;
            color: #555;
        }
        .demo-box strong {
            color: #1a3c5e;
            font-size: 0.85rem;
        }
        .btn-demo {
            margin-top: 8px;
            background: white;
            color: #1a3c5e;
            border: 1px solid #1a3c5e;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.82rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-demo:hover { background: #1a3c5e; color: white; }
    </style>
</head>
<body>

<div class="login-wrapper">
    <div class="login-card">
        <h2>LoanWatch</h2>
        <p>Loan risk monitoring system</p>

        <!-- Demo box -->
        <div class="demo-box" style="margin-top: 16px;">
            <strong>🔍 Try Demo</strong>
            <p>Email: demo@loanwatch.com</p>
            <p>Password: demo123</p>
            <button class="btn-demo" onclick="fillDemo()">Use Demo Account</button>
        </div>

        <div class="tabs">
            <div class="tab active" onclick="switchTab('login')">Sign In</div>
            <div class="tab" onclick="switchTab('register')">Register</div>
        </div>

        <!-- Login -->
        <div class="tab-panel active" id="loginPanel">
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="loginEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="loginPassword" placeholder="••••••••">
            </div>
            <button class="btn-primary" onclick="login()">Sign In</button>
            <p class="error-msg" id="loginErr"></p>
        </div>

        <!-- Register -->
        <div class="tab-panel" id="registerPanel">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" id="regName" placeholder="Raj Vaibhav">
            </div>
            <div class="form-group">
                <label>Email</label>
                <input type="email" id="regEmail" placeholder="you@example.com">
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" id="regPassword" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label>Role</label>
                <select class="role-select" id="regRole">
                    <option value="MANAGER">Manager</option>
                    <option value="ADMIN">Admin</option>
                    <option value="FIELD_AGENT">Field Agent</option>
                </select>
            </div>
            <button class="btn-primary" onclick="register()">Create Account</button>
            <p class="error-msg" id="registerErr"></p>
            <p class="success-msg" id="registerSuccess">Account created! You can now sign in.</p>
        </div>
    </div>
</div>

<script>
    if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
    }

    function fillDemo() {
        switchTab('login');
        document.getElementById('loginEmail').value = 'demo@loanwatch.com';
        document.getElementById('loginPassword').value = 'demo123';
    }

    function switchTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
        if (tab === 'login') {
            document.querySelectorAll('.tab')[0].classList.add('active');
            document.getElementById('loginPanel').classList.add('active');
        } else {
            document.querySelectorAll('.tab')[1].classList.add('active');
            document.getElementById('registerPanel').classList.add('active');
        }
    }

    async function login() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value.trim();
        const errEl = document.getElementById('loginErr');
        errEl.style.display = 'none';

        if (!email || !password) {
            errEl.textContent = 'Please fill in all fields';
            errEl.style.display = 'block';
            return;
        }

        try {
            const res = await fetch(`/api/auth/login?email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}`, {
                method: 'POST'
            });
            const token = await res.text();

            if (!res.ok || token.toLowerCase().includes('not found') || token.toLowerCase().includes('wrong')) {
                errEl.textContent = token;
                errEl.style.display = 'block';
                return;
            }

            localStorage.setItem('token', token);
            window.location.href = 'dashboard.html';

        } catch (e) {
            errEl.textContent = 'Could not connect to server';
            errEl.style.display = 'block';
        }
    }

    async function register() {
        const name = document.getElementById('regName').value.trim();
        const email = document.getElementById('regEmail').value.trim();
        const password = document.getElementById('regPassword').value.trim();
        const role = document.getElementById('regRole').value;
        const errEl = document.getElementById('registerErr');
        const successEl = document.getElementById('registerSuccess');

        errEl.style.display = 'none';
        successEl.style.display = 'none';

        if (!name || !email || !password) {
            errEl.textContent = 'Please fill in all fields';
            errEl.style.display = 'block';
            return;
        }

        try {
            const res = await fetch(`/api/auth/register?name=${encodeURIComponent(name)}&email=${encodeURIComponent(email)}&password=${encodeURIComponent(password)}&role=${role}`, {
                method: 'POST'
            });
            const msg = await res.text();

            if (msg.toLowerCase().includes('already')) {
                errEl.textContent = msg;
                errEl.style.display = 'block';
                return;
            }

            successEl.style.display = 'block';
            setTimeout(() => switchTab('login'), 1500);

        } catch (e) {
            errEl.textContent = 'Could not connect to server';
            errEl.style.display = 'block';
        }
    }

    document.addEventListener('keydown', (e) => {
        if (e.key === 'Enter') {
            const activePanel = document.querySelector('.tab-panel.active').id;
            if (activePanel === 'loginPanel') login();
            else register();
        }
    });
</script>

</body>
</html>
