<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanWatch – Borrower Detail</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open { display: flex; }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h3 { margin: 0 0 20px 0; font-size: 1.1rem; color: #1a3c5e; }
        .modal .form-group { margin-bottom: 14px; }
        .modal label { display: block; font-size: 0.8rem; color: #888; margin-bottom: 5px; }
        .modal input, .modal select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
            background: white;
        }
        .modal input:focus, .modal select:focus { border-color: #1a3c5e; }
        .modal-actions { display: flex; gap: 10px; margin-top: 20px; }
        .btn-cancel {
            flex: 1; padding: 10px; background: #f5f5f5;
            border: none; border-radius: 6px; cursor: pointer; font-size: 0.88rem; color: #555;
        }
        .btn-cancel:hover { background: #eee; }
        .btn-submit {
            flex: 2; padding: 10px; background: #1a3c5e;
            color: white; border: none; border-radius: 6px;
            cursor: pointer; font-size: 0.88rem; font-weight: 600;
        }
        .btn-submit:hover { background: #14304d; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
        .modal-err { font-size: 0.78rem; color: #e74c3c; margin-top: 10px; display: none; }
        .btn-add-loan {
            background: #27ae60; color: white; border: none;
            padding: 7px 16px; border-radius: 6px;
            font-size: 0.82rem; cursor: pointer; font-weight: 500;
        }
        .btn-add-loan:hover { background: #219a52; }
    </style>
</head>
<!-- Add Loan Modal -->
<div class="modal-overlay" id="loanModal">
    <div class="modal">
        <h3>Add New Loan</h3>
        <div class="form-group">
            <label>Loan Amount (₹)</label>
            <input type="number" id="loanAmount" placeholder="e.g. 50000">
        </div>
        <div class="form-group">
            <label>Disbursed Date</label>
            <input type="date" id="loanDisbursed">
        </div>
        <div class="form-group">
            <label>Due Date</label>
            <input type="date" id="loanDue">
        </div>
        <div class="form-group">
            <label>Status</label>
            <select id="loanStatus">
                <option value="ACTIVE">Active</option>
                <option value="CLOSED">Closed</option>
                <option value="DEFAULTED">Defaulted</option>
            </select>
        </div>
        <p class="modal-err" id="loanErr"></p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeLoanModal()">Cancel</button>
            <button class="btn-submit" id="loanSubmitBtn" onclick="addLoan()">Add Loan</button>
        </div>
    </div>
</div>

<body>

<div class="navbar">
    <h1>LoanWatch</h1>
    <div style="display:flex; align-items:center; gap:16px;">
        <span id="userEmail"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<div class="page-content">
    <a class="back-link" href="dashboard.html">← Back to Dashboard</a>

    <div class="detail-grid">
        <div class="info-card" id="borrowerInfo">
            <h3>Borrower Info</h3>
            <p class="loading">Loading...</p>
        </div>

        <div class="info-card">
            <h3>Risk Score</h3>
            <div class="risk-display" id="riskDisplay">
                <p class="loading">Loading...</p>
            </div>
        </div>
    </div>

    <div class="info-card" style="margin-bottom: 24px;">
        <h3>Assign Field Agent</h3>
        <div style="display:flex; gap:12px; align-items:center; margin-top:10px;">
            <div>
                <p style="font-size:0.82rem; color:#888; margin-bottom:6px;">Current Agent ID: <span id="currentAgentId" style="font-weight:600; color:#1a3c5e;">–</span></p>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="agentIdInput" placeholder="Enter Agent ID" style="padding:9px 12px; border:1px solid #ddd; border-radius:6px; font-size:0.88rem; width:180px; outline:none;">
                    <button onclick="assignAgent()" style="background:#1a3c5e; color:white; border:none; padding:9px 18px; border-radius:6px; font-size:0.85rem; cursor:pointer; font-weight:500;" id="assignBtn">Assign</button>
                </div>
            </div>
            <p id="assignMsg" style="font-size:0.82rem; margin-top:20px; display:none;"></p>
        </div>
    </div>

    <div class="table-card">
        <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:14px;">
            <p style="font-weight:600; font-size:0.9rem; color:#1a3c5e; margin:0;">Loan History</p>
            <button class="btn-add-loan" onclick="openLoanModal()">+ Add Loan</button>
        </div>
        <table>
            <thead>
            <tr>
                <th>Loan ID</th>
                <th>Amount</th>
                <th>Disbursed</th>
                <th>Due Date</th>
                <th>Status</th>
            </tr>
            </thead>
            <tbody id="loanTable">
            <tr><td colspan="5" class="loading">Loading loans...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = 'index.html';
    }

    function parseEmail(token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            return payload.sub;
        } catch {
            return '';
        }
    }

    document.getElementById('userEmail').textContent = parseEmail(token);

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html?logout';
    }

    function authHeaders() {
        return { 'Authorization': 'Bearer ' + token };
    }

    const borrowerId = new URLSearchParams(window.location.search).get('id');

    if (!borrowerId) {
        window.location.href = 'dashboard.html';
    }

    async function loadBorrower() {
        const res = await fetch(`/api/manager/borrowers/${borrowerId}`, {
            headers: authHeaders()
        });
        const b = await res.json();

        document.title = `LoanWatch – ${b.name}`;
        document.getElementById('currentAgentId').textContent = b.assignedAgentId || 'None';

        document.getElementById('borrowerInfo').innerHTML = `
            <h3>Borrower Info</h3>
            <div class="info-row">
                <span class="label">Name</span>
                <span class="value">${b.name}</span>
            </div>
            <div class="info-row">
                <span class="label">Phone</span>
                <span class="value">${b.phone}</span>
            </div>
            <div class="info-row">
                <span class="label">Address</span>
                <span class="value">${b.address}</span>
            </div>
            <div class="info-row">
                <span class="label">Monthly Income</span>
                <span class="value">₹${b.monthlyIncome.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</span>
            </div>
            <div class="info-row">
                <span class="label">Assigned Agent ID</span>
                <span class="value">${b.assignedAgentId || '–'}</span>
            </div>
        `;
    }

    async function assignAgent() {
        const agentId = document.getElementById('agentIdInput').value.trim();
        const msgEl = document.getElementById('assignMsg');
        const btn = document.getElementById('assignBtn');

        if (!agentId) {
            msgEl.textContent = 'Please enter an Agent ID';
            msgEl.style.color = '#e74c3c';
            msgEl.style.display = 'block';
            return;
        }

        btn.textContent = 'Saving...';
        btn.disabled = true;

        try {
            const res = await fetch(`/api/manager/borrowers/${borrowerId}/assign-agent?agentId=${agentId}`, {
                method: 'PUT',
                headers: authHeaders()
            });

            if (res.ok) {
                msgEl.textContent = `✓ Agent ${agentId} assigned successfully`;
                msgEl.style.color = '#27ae60';
                document.getElementById('currentAgentId').textContent = agentId;
            } else {
                msgEl.textContent = 'Failed to assign agent';
                msgEl.style.color = '#e74c3c';
            }
        } catch (e) {
            msgEl.textContent = 'Connection error';
            msgEl.style.color = '#e74c3c';
        }

        msgEl.style.display = 'block';
        btn.textContent = 'Assign';
        btn.disabled = false;
    }

    async function loadRisk() {
        try {
            const res = await fetch(`/api/manager/borrowers/${borrowerId}/risk`, {
                headers: authHeaders()
            });

            if (!res.ok) {
                document.getElementById('riskDisplay').innerHTML = '<p style="color:#aaa; font-size:0.88rem;">No risk data yet — run the risk engine first</p>';
                return;
            }

            const text = await res.text();

            if (!text || text === 'null') {
                document.getElementById('riskDisplay').innerHTML = '<p style="color:#aaa; font-size:0.88rem;">Not scored yet — go to dashboard and click Run Risk Engine</p>';
                return;
            }

            const data = JSON.parse(text);
            const level = data.riskLevel;

            document.getElementById('riskDisplay').innerHTML = `
                <div class="risk-score-num">${data.score}</div>
                <div class="risk-level-text ${level}">${level} RISK</div>
                <p style="font-size:0.78rem; color:#aaa; margin-top:10px;">
                    Last calculated: ${new Date(data.calculatedAt).toLocaleString('en-IN')}
                </p>
            `;
        } catch (e) {
            document.getElementById('riskDisplay').innerHTML = '<p style="color:#aaa; font-size:0.88rem;">Could not load risk score</p>';
        }
    }

    async function loadLoans() {
        try {
            const res = await fetch(`/api/manager/loans/borrower/${borrowerId}`, {
                headers: authHeaders()
            });
            const loans = await res.json();
            const tbody = document.getElementById('loanTable');

            if (loans.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="loading">No loans found</td></tr>';
                return;
            }

            tbody.innerHTML = '';
            for (const loan of loans) {
                const statusColor = loan.status === 'DEFAULTED' ? '#e74c3c' : loan.status === 'CLOSED' ? '#888' : '#27ae60';
                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${loan.id}</td>
                    <td>₹${loan.amount.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</td>
                    <td>${loan.disbursedDate || '–'}</td>
                    <td>${loan.dueDate || '–'}</td>
                    <td><span style="color:${statusColor}; font-weight:600; font-size:0.82rem;">${loan.status}</span></td>
                `;
                tbody.appendChild(row);
            }
        } catch {
            document.getElementById('loanTable').innerHTML = '<tr><td colspan="5" class="loading">Could not load loans</td></tr>';
        }
    }

    function openLoanModal() {
        document.getElementById('loanAmount').value = '';
        document.getElementById('loanDisbursed').value = new Date().toISOString().split('T')[0];
        document.getElementById('loanDue').value = '';
        document.getElementById('loanStatus').value = 'ACTIVE';
        document.getElementById('loanErr').style.display = 'none';
        document.getElementById('loanModal').classList.add('open');
    }

    function closeLoanModal() {
        document.getElementById('loanModal').classList.remove('open');
    }

    document.getElementById('loanModal').addEventListener('click', function(e) {
        if (e.target === this) closeLoanModal();
    });

    async function addLoan() {
        const amount = document.getElementById('loanAmount').value.trim();
        const disbursed = document.getElementById('loanDisbursed').value;
        const due = document.getElementById('loanDue').value;
        const status = document.getElementById('loanStatus').value;
        const errEl = document.getElementById('loanErr');
        const btn = document.getElementById('loanSubmitBtn');

        errEl.style.display = 'none';

        if (!amount || !disbursed || !due) {
            errEl.textContent = 'Amount, disbursed date and due date are required';
            errEl.style.display = 'block';
            return;
        }

        if (isNaN(amount) || Number(amount) <= 0) {
            errEl.textContent = 'Enter a valid loan amount';
            errEl.style.display = 'block';
            return;
        }

        if (new Date(due) <= new Date(disbursed)) {
            errEl.textContent = 'Due date must be after disbursed date';
            errEl.style.display = 'block';
            return;
        }

        btn.textContent = 'Saving...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/manager/loans', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    borrowerId: parseInt(borrowerId),
                    amount: parseFloat(amount),
                    disbursedDate: disbursed,
                    dueDate: due,
                    status: status
                })
            });

            if (res.ok) {
                closeLoanModal();
                loadLoans();
            } else {
                errEl.textContent = 'Failed to add loan. Try again.';
                errEl.style.display = 'block';
            }
        } catch (e) {
            errEl.textContent = 'Connection error';
            errEl.style.display = 'block';
        }

        btn.textContent = 'Add Loan';
        btn.disabled = false;
    }

    loadBorrower();
    loadRisk();
    loadLoans();
</script>

</body>
</html>
