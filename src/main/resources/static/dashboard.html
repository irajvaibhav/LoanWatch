<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoanWatch – Dashboard</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .btn-run {
            background: #1a3c5e;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-run:hover { background: #14304d; }
        .btn-run:disabled { background: #aaa; cursor: not-allowed; }

        .btn-add {
            background: #27ae60;
            color: white;
            border: none;
            padding: 9px 18px;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            font-weight: 500;
        }
        .btn-add:hover { background: #219a52; }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.open {
            display: flex;
        }
        .modal {
            background: white;
            border-radius: 12px;
            padding: 32px;
            width: 440px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.2);
        }
        .modal h3 {
            margin: 0 0 20px 0;
            font-size: 1.1rem;
            color: #1a3c5e;
        }
        .modal .form-group {
            margin-bottom: 14px;
        }
        .modal label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 5px;
        }
        .modal input {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 0.9rem;
            outline: none;
            box-sizing: border-box;
        }
        .modal input:focus { border-color: #1a3c5e; }
        .modal-actions {
            display: flex;
            gap: 10px;
            margin-top: 20px;
        }
        .btn-cancel {
            flex: 1;
            padding: 10px;
            background: #f5f5f5;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            color: #555;
        }
        .btn-cancel:hover { background: #eee; }
        .btn-submit {
            flex: 2;
            padding: 10px;
            background: #1a3c5e;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.88rem;
            font-weight: 600;
        }
        .btn-submit:hover { background: #14304d; }
        .btn-submit:disabled { background: #aaa; cursor: not-allowed; }
        .modal-err {
            font-size: 0.78rem;
            color: #e74c3c;
            margin-top: 10px;
            display: none;
        }
    </style>
</head>
<body>

<div class="navbar">
    <h1>LoanWatch</h1>
    <div style="display:flex; align-items:center; gap:16px;">
        <span id="userEmail"></span>
        <button class="logout-btn" onclick="logout()">Logout</button>
    </div>
</div>

<!-- Add Borrower Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal">
        <h3>Add New Borrower</h3>
        <div class="form-group">
            <label>Full Name</label>
            <input type="text" id="newName" placeholder="e.g. Ramesh Kumar">
        </div>
        <div class="form-group">
            <label>Phone Number</label>
            <input type="text" id="newPhone" placeholder="e.g. 9876543210">
        </div>
        <div class="form-group">
            <label>Address</label>
            <input type="text" id="newAddress" placeholder="e.g. Village Rampur, UP">
        </div>
        <div class="form-group">
            <label>Monthly Income (₹)</label>
            <input type="number" id="newIncome" placeholder="e.g. 15000">
        </div>
        <p class="modal-err" id="modalErr"></p>
        <div class="modal-actions">
            <button class="btn-cancel" onclick="closeModal()">Cancel</button>
            <button class="btn-submit" id="submitBtn" onclick="addBorrower()">Add Borrower</button>
        </div>
    </div>
</div>

<div class="page-content">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom: 20px;">
        <p class="page-title" style="margin-bottom:0;">Borrower Overview</p>
        <div style="display:flex; gap:10px;">
            <button class="btn-add" onclick="openModal()">+ Add Borrower</button>
            <button class="btn-run" id="riskBtn" onclick="runRiskEngine()">▶ Run Risk Engine</button>
        </div>
    </div>

    <div class="stats-row">
        <div class="stat-card">
            <h3>Total Borrowers</h3>
            <div class="count" id="totalCount">–</div>
        </div>
        <div class="stat-card high">
            <h3>High Risk</h3>
            <div class="count" id="highCount">–</div>
        </div>
        <div class="stat-card medium">
            <h3>Medium Risk</h3>
            <div class="count" id="mediumCount">–</div>
        </div>
        <div class="stat-card low">
            <h3>Low Risk</h3>
            <div class="count" id="lowCount">–</div>
        </div>
    </div>

    <div class="table-card">
        <table>
            <thead>
            <tr>
                <th>ID</th>
                <th>Name</th>
                <th>Phone</th>
                <th>Monthly Income</th>
                <th>Risk Level</th>
            </tr>
            </thead>
            <tbody id="borrowerTable">
            <tr><td colspan="5" class="loading">Loading borrowers...</td></tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const token = localStorage.getItem('token');

    if (!token) {
        window.location.href = 'index.html';
    }

    function parseEmail(token) {
        try {
            const payload = JSON.parse(atob(token.split('.')[1]));
            return payload.sub;
        } catch {
            return '';
        }
    }

    document.getElementById('userEmail').textContent = parseEmail(token);

    function logout() {
        localStorage.removeItem('token');
        window.location.href = 'index.html?logout';
    }

    function authHeaders() {
        return { 'Authorization': 'Bearer ' + token };
    }

    function openModal() {
        document.getElementById('newName').value = '';
        document.getElementById('newPhone').value = '';
        document.getElementById('newAddress').value = '';
        document.getElementById('newIncome').value = '';
        document.getElementById('modalErr').style.display = 'none';
        document.getElementById('modalOverlay').classList.add('open');
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
    }

    document.getElementById('modalOverlay').addEventListener('click', function(e) {
        if (e.target === this) closeModal();
    });

    async function addBorrower() {
        const name = document.getElementById('newName').value.trim();
        const phone = document.getElementById('newPhone').value.trim();
        const address = document.getElementById('newAddress').value.trim();
        const income = document.getElementById('newIncome').value.trim();
        const errEl = document.getElementById('modalErr');
        const btn = document.getElementById('submitBtn');

        errEl.style.display = 'none';

        if (!name || !phone || !address || !income) {
            errEl.textContent = 'All fields are required';
            errEl.style.display = 'block';
            return;
        }

        if (isNaN(income) || Number(income) <= 0) {
            errEl.textContent = 'Enter a valid monthly income';
            errEl.style.display = 'block';
            return;
        }

        btn.textContent = 'Saving...';
        btn.disabled = true;

        try {
            const res = await fetch('/api/manager/borrowers', {
                method: 'POST',
                headers: {
                    'Authorization': 'Bearer ' + token,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    name: name,
                    phone: phone,
                    address: address,
                    monthlyIncome: parseFloat(income)
                })
            });

            if (res.ok) {
                closeModal();
                loadDashboard();
            } else {
                errEl.textContent = 'Failed to add borrower. Try again.';
                errEl.style.display = 'block';
            }
        } catch (e) {
            errEl.textContent = 'Connection error';
            errEl.style.display = 'block';
        }

        btn.textContent = 'Add Borrower';
        btn.disabled = false;
    }

    async function loadDashboard() {
        try {
            const [borrowersRes, riskRes] = await Promise.all([
                fetch('/api/manager/borrowers', { headers: authHeaders() }),
                fetch('/api/manager/risk-scores', { headers: authHeaders() })
            ]);

            if (borrowersRes.status === 403) {
                document.getElementById('borrowerTable').innerHTML =
                    '<tr><td colspan="5" class="loading">Access denied — login as MANAGER or ADMIN</td></tr>';
                return;
            }

            const borrowers = await borrowersRes.json();
            const riskScores = await riskRes.json();

            const riskMap = {};
            for (const r of riskScores) {
                riskMap[r.borrowerId] = r.riskLevel;
            }

            document.getElementById('totalCount').textContent = borrowers.length;

            let high = 0, medium = 0, low = 0;
            const tbody = document.getElementById('borrowerTable');
            tbody.innerHTML = '';

            for (const b of borrowers) {
                const risk = riskMap[b.id] || null;
                if (risk === 'HIGH') high++;
                else if (risk === 'MEDIUM') medium++;
                else if (risk === 'LOW') low++;

                const badgeClass = risk || 'NA';
                const badgeText = risk || 'Not scored';

                const row = document.createElement('tr');
                row.innerHTML = `
                    <td>${b.id}</td>
                    <td>${b.name}</td>
                    <td>${b.phone}</td>
                    <td>₹${b.monthlyIncome.toLocaleString('en-IN', { maximumFractionDigits: 0 })}</td>
                    <td><span class="badge ${badgeClass}">${badgeText}</span></td>
                `;
                row.onclick = () => window.location.href = `borrower.html?id=${b.id}`;
                tbody.appendChild(row);
            }

            document.getElementById('highCount').textContent = high;
            document.getElementById('mediumCount').textContent = medium;
            document.getElementById('lowCount').textContent = low;

        } catch (e) {
            document.getElementById('borrowerTable').innerHTML =
                '<tr><td colspan="5" class="loading">Failed to load data</td></tr>';
        }
    }

    async function runRiskEngine() {
        const btn = document.getElementById('riskBtn');
        btn.disabled = true;
        btn.textContent = 'Running...';

        try {
            await fetch('/api/manager/run-risk-engine', {
                method: 'POST',
                headers: authHeaders()
            });
            btn.textContent = '✓ Done';
            setTimeout(() => {
                btn.textContent = '▶ Run Risk Engine';
                btn.disabled = false;
                loadDashboard();
            }, 1500);
        } catch (e) {
            btn.textContent = 'Failed';
            btn.disabled = false;
        }
    }

    loadDashboard();
</script>

</body>
</html>
